  <main class="post-content"><h2 id="AI-Agent是什么">AI Agent是什么</h2>
<p>AI Agent（人工智能代理）是一种能自主感知周遭环境，通过内在的智能处理进行决策，并执行相应行动以达成特定目的的智能体。其核心特征是通过与环境互动收集数据，独立规划任务路径、调用工具并执行决策，最终在无需人工干预的情况下实现预设目标。</p>
